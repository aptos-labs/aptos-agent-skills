name: Update README badge counts

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "community-skills/**"
      - "patterns/**"

permissions:
  contents: write

jobs:
  update-badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count skills and patterns
        id: count
        run: |
          OFFICIAL=$(find skills/ -name "SKILL.md" | wc -l | tr -d ' ')
          COMMUNITY=$(find community-skills/ -name "SKILL.md" 2>/dev/null | wc -l | tr -d ' ')
          PATTERNS=$(find patterns/ -name "*.md" | wc -l | tr -d ' ')
          TOTAL_SKILLS=$((OFFICIAL + COMMUNITY))
          echo "skills=$TOTAL_SKILLS" >> "$GITHUB_OUTPUT"
          echo "patterns=$PATTERNS" >> "$GITHUB_OUTPUT"
          echo "Official: $OFFICIAL, Community: $COMMUNITY, Total Skills: $TOTAL_SKILLS, Patterns: $PATTERNS"

      - name: Update badge counts in README
        run: |
          sed -i "s/Skills-[0-9]*-green/Skills-${{ steps.count.outputs.skills }}-green/" README.md
          sed -i "s/Patterns-[0-9]*-orange/Patterns-${{ steps.count.outputs.patterns }}-orange/" README.md

      - name: Commit if changed
        run: |
          git diff --quiet README.md && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update README badge counts [skip ci]"
          git push
